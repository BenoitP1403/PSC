          - switch_2:eth-6<->client_6:eth-1
          - switch_2:eth-7<->client_7:eth-1
          - switch_2:eth-8<->client_8:eth-1
          - switch_2:eth-9<->security_suite:eth-2
      - type: none
        label: ICS
        options: {}

