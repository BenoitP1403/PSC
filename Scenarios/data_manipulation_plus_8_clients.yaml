          num_services: 1
          num_applications: 0
          num_folders: 1
          num_files: 1
          num_nics: 2
          include_num_access: false
          include_nmne: true
          monitored_traffic:
            icmp:
            - NONE
            tcp:
            - DNS
          routers:
          - hostname: router_1
          num_ports: 0
          ip_list:
          - 192.168.1.10
          - 192.168.1.12
          - 192.168.1.14
          - 192.168.1.16
          - 192.168.1.110
          - 192.168.10.21
          - 192.168.10.22
          - 192.168.10.23
          - 192.168.10.24
          - 192.168.10.25
          - 192.168.10.26
          - 192.168.10.27
          - 192.168.10.28
          - 192.168.10.110
          wildcard_list:
          - 0.0.0.1
          port_list:
          - HTTP
          - POSTGRES_SERVER
          protocol_list:
          - ICMP
          - TCP
          - UDP
          num_rules: 18  # Usable defender ACL slots stop at 17 because baseline permit rules occupy 18-23.
      - type: links
        label: LINKS
        options:
          link_references:
          - router_1:eth-1<->switch_1:eth-8
          - router_1:eth-2<->switch_2:eth-10
          - switch_1:eth-1<->domain_controller:eth-1
          - switch_1:eth-2<->web_server:eth-1
          - switch_1:eth-3<->database_server:eth-1
          - switch_1:eth-4<->backup_server:eth-1
          - switch_1:eth-7<->security_suite:eth-1
          - switch_2:eth-1<->client_1:eth-1
          - switch_2:eth-2<->client_2:eth-1
          - switch_2:eth-3<->client_3:eth-1
