          hosts:
          - hostname: domain_controller
          - hostname: web_server
            services:
            - service_name: web-server
          - hostname: database_server
            folders:
            - folder_name: database
              files:
              - file_name: database.db
          - hostname: backup_server
          - hostname: security_suite
          - hostname: client_1
          - hostname: client_2
          - hostname: client_3
          - hostname: client_4
          - hostname: client_5
          - hostname: client_6
          - hostname: client_7
