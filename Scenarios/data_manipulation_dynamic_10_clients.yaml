                - 0.0.0.1
              port_list:
                - HTTP
                - POSTGRES_SERVER
              protocol_list:
                - ICMP
                - TCP
                - UDP
              num_rules: 24

          - type: links
            label: LINKS
            options:
              link_references:
                - router_1:eth-1<->switch_1:eth-8
                - router_1:eth-2<->switch_2:eth-8
                - router_1:eth-3<->switch_3:eth-8
                - switch_1:eth-1<->domain_controller:eth-1
                - switch_1:eth-2<->web_server:eth-1
                - switch_1:eth-3<->database_server:eth-1
                - switch_1:eth-4<->backup_server:eth-1
                - switch_1:eth-7<->security_suite:eth-1
                - switch_2:eth-1<->client_1:eth-1
                - switch_2:eth-2<->client_2:eth-1
                - switch_2:eth-3<->client_3:eth-1
                - switch_2:eth-4<->client_4:eth-1
                - switch_2:eth-5<->client_5:eth-1
                - switch_2:eth-7<->security_suite:eth-2
                - switch_3:eth-1<->client_6:eth-1
                - switch_3:eth-2<->client_7:eth-1
                - switch_3:eth-3<->client_8:eth-1
                - switch_3:eth-4<->client_9:eth-1
                - switch_3:eth-5<->client_10:eth-1

          - type: none
            label: ICS
            options: {}

