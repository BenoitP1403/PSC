  - ref: data_manipulation_attacker
    team: RED
    type: red-database-corrupting-agent
    agent_settings:
      possible_start_nodes:
        - client_1
        - client_2
        - client_3
        - client_4
        - client_5
        - client_6
        - client_7
        - client_8
        - client_9
        - client_10
      target_application: data-manipulation-bot
      start_step: 25
      frequency: 20
      variance: 5

  - ref: defender
    team: BLUE
    type: proxy-agent

    observation_space:
      type: custom
      options:
        components:
          - type: nodes
            label: NODES
            options:
              hosts:
                - hostname: domain_controller
                - hostname: web_server
                  services:
                    - service_name: web-server
                - hostname: database_server
                  folders:
                    - folder_name: database
                      files:
                        - file_name: database.db
                - hostname: backup_server
                - hostname: security_suite
                - hostname: client_1
                - hostname: client_2
                - hostname: client_3
                - hostname: client_4
                - hostname: client_5
                - hostname: client_6
                - hostname: client_7
                - hostname: client_8
                - hostname: client_9
                - hostname: client_10
              num_services: 1
              num_applications: 0
              num_folders: 1
              num_files: 1
              num_nics: 2
              include_num_access: false
              include_nmne: true
              monitored_traffic:
                icmp:
                  - NONE
                tcp:
                  - DNS
              routers:
                - hostname: router_1
              num_ports: 0
              ip_list:
                - 192.168.1.10
                - 192.168.1.12
                - 192.168.1.14
                - 192.168.1.16
                - 192.168.1.110
                - 192.168.10.21
                - 192.168.10.22
                - 192.168.10.23
                - 192.168.10.24
                - 192.168.10.25
                - 192.168.20.26
                - 192.168.20.27
                - 192.168.20.28
                - 192.168.20.29
                - 192.168.20.30
