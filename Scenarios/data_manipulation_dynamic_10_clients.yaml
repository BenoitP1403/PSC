metadata:
  version: 3.0

io_settings:
  save_agent_actions: true
  save_step_metadata: false
  save_pcap_logs: false
  save_sys_logs: false
  sys_log_level: WARNING

game:
  max_episode_length: 128
  ports:
    - HTTP
    - POSTGRES_SERVER
  protocols:
    - ICMP
    - TCP
    - UDP
  thresholds:
    nmne:
      high: 10
      medium: 5
      low: 0

agents:
  - ref: client_1_green_user
    team: GREEN
    type: probabilistic-agent
    agent_settings:
      action_probabilities: {0: 0.3, 1: 0.6, 2: 0.1}
    action_space:
      action_map:
        0: {action: do-nothing, options: {}}
        1: {action: node-application-execute, options: {node_name: client_1, application_name: web-browser}}
        2: {action: node-application-execute, options: {node_name: client_1, application_name: database-client}}
    reward_function:
      reward_components:
        - type: webpage-unavailable-penalty
          weight: 0.25
          options: {node_hostname: client_1}
        - type: green-admin-database-unreachable-penalty
          weight: 0.05
          options: {node_hostname: client_1}

